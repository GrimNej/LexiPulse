name: Daily Newsletter Send

on:
  workflow_dispatch:         # Manual trigger only — VM cron handles the daily schedule

jobs:
  trigger-daily-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger daily send endpoint
        run: |
          curl -X POST "http://157.151.215.192/scheduler/run" \
            -H "X-Scheduler-Key: ${{ secrets.SCHEDULER_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            --retry 3 \
            --retry-delay 10 \
            --fail
